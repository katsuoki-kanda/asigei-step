<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>足芸マスター (ステップ対応版)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Arial Black', 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
        }

        .container { position: relative; width: 100%; height: 100%; overflow: hidden; }
        video { display: none; }
        canvas { width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); }

        .ui-header {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 96%;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 50;
            pointer-events: none;
        }

        .info-box {
            background: rgba(0,0,0,0.7);
            padding: 8px 25px;
            border-radius: 15px;
            font-size: clamp(24px, 5vh, 60px); 
            border: 3px solid;
            font-weight: 900;
            text-shadow: 2px 2px 10px rgba(0,0,0,1);
            min-width: 220px;
            text-align: center;
        }
        #score-display { color: #00ffcc; border-color: #00ffcc; }
        #timer-display { color: #ff3366; border-color: #ff3366; }

        #command-container {
            position: absolute;
            top: 55%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 20;
        }

        #command-text {
            font-size: 38vh; 
            font-weight: 900;
            color: #00ff00;
            text-align: center;
            line-height: 0.9;
            white-space: nowrap;
            letter-spacing: -0.06em;
            text-shadow: 
                12px 12px 0px #000, 
                -12px -12px 0px #000, 
                12px -12px 0px #000, 
                -12px 12px 0px #000,
                0 0 100px rgba(0,255,0,0.6);
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; color: white;
        }
        .overlay.preview-mode { background: rgba(0,0,0,0.3); }

        .btn-start {
            padding: 25px 60px;
            font-size: 30px;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 30px rgba(255,0,0,0.6);
            pointer-events: auto;
        }

        #status-msg {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(0,255,0,0.85); color: #000; padding: 12px 30px;
            border-radius: 40px; font-size: 30px; font-weight: bold; z-index: 60; display: none;
        }

        .text-shadow-bg {
            background: rgba(0,0,0,0);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
        }

        .highlight { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
        <div id="status-msg"></div>
       
        <div class="ui-header">
            <div id="score-display" class="info-box">SCORE: <span id="val-score">0</span></div>
            <div id="timer-display" class="info-box">TIME: <span id="val-timer">60</span></div>
        </div>

        <div id="command-container">
            <div id="command-text"></div>
        </div>

        <div id="start-screen" class="overlay">
            <div class="text-shadow-bg">
                <h1 style="font-size: 60px; margin-bottom: 20px;">足芸マスター(ステップ対応版)</h1>
                <button class="btn-start" onclick="initApp()">カメラを起動する</button>
                <div id="setup-guide" style="margin-top:30px; font-size: 22px; line-height: 1.6;">
                    画面に全身が映るように立って準備！<br>
                    <span class="highlight">「全身を映して」→「片手をあげて」→「さげる」</span> で開始！
                </div>
            </div>
        </div>

        <div id="result-screen" class="overlay" style="display: none;">
            <div class="text-shadow-bg">
                <h1 id="result-title" style="font-size: 10vh; color: #ffcc00; margin-bottom: 10px;">TIME UP</h1>
                <div style="font-size: 8vh; margin-bottom: 30px;">SCORE: <span id="final-score" style="color:#00ff00;">0</span></div>
                <div>
                    <span class="highlight" style="font-size: 32px;">もういちど？</span><br>
                    <span style="font-size: 24px;">「全身を映した状態」で手をあげて戻すとスタート</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        
        // コマンドを「よこ」から「そと」に変更
        const commands = ["ひだりまえ", "ひだりそと", "ひだりうしろ", "みぎまえ", "みぎそと", "みぎうしろ", "りょうあし", "かかとあげ"];
        let currentTarget = "";
        let score = 0;
        let timeLeft = 60;
        let gameActive = false;
        let waitingForNeutral = false; 
        let isWaitingForReturn = false; 
        let isProcessingSuccess = false; 
        let timerInterval = null;
        let appInitialized = false;
        let lastEndTime = 0;

        const START_COOLDOWN = 3000;  
        const EXIT_HOLD_TIME = 3000;   
        const LEG_THRESHOLD_RATIO = 0.82; 
        
        const KNEE_STAY_THRESHOLD = 0.05; 
        const VISIBILITY_THRESHOLD = 0.5; 

        // ステップ判定用の閾値（画面サイズに対する比率）
        const STEP_FORWARD_TH = 0.06; 
        const STEP_BACKWARD_TH = -0.06;
        const STEP_OUTWARD_TH = 0.06;
        const RETURN_TH = 0.06; 

        let initialHipAnkleDistL = 0;
        let initialHipAnkleDistR = 0;
        let initialKneeY_L = 0;
        let initialKneeY_R = 0;
        let initialAnkleY_L = 0;
        let initialAnkleY_R = 0;
        let initialAnkleX_L = 0;
        let initialAnkleX_R = 0;
        let initialElbowY = 0;

        let startTriggerSide = "none";
        let handsUpStartTime = null; 

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const synth = window.speechSynthesis;

        function playSound(freq, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }

        function speak(text) {
            synth.cancel();
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ja-JP';
            uttr.rate = 2.0; 
            synth.speak(uttr);
        }

        function recordBasePosition(lm) {
            initialHipAnkleDistL = Math.abs(lm[27].y - lm[23].y);
            initialHipAnkleDistR = Math.abs(lm[28].y - lm[24].y);
            initialKneeY_L = lm[25].y;
            initialKneeY_R = lm[26].y;
            initialAnkleY_L = lm[27].y;
            initialAnkleY_R = lm[28].y;
            initialAnkleX_L = lm[27].x;
            initialAnkleX_R = lm[28].x;

            if (startTriggerSide === "left") {
                initialElbowY = lm[14].y; 
            } else if (startTriggerSide === "right") {
                initialElbowY = lm[13].y; 
            } else {
                initialElbowY = (lm[13].y + lm[14].y) / 2;
            }
            
            const msg = document.getElementById('status-msg');
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 1000);
        }

        function triggerRealStart(lm) {
            recordBasePosition(lm);
            waitingForNeutral = false;
            gameActive = true;
            isProcessingSuccess = false;
            isWaitingForReturn = false;
            score = 0;
            timeLeft = 60;
            document.getElementById('val-score').innerText = score;
            document.getElementById('val-timer').innerText = timeLeft;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'none';
            
            playSound(880, 0.5);
            nextCommand();

            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('val-timer').innerText = timeLeft;
                if (timeLeft <= 0) endGame(false);
            }, 1000);
        }

        function prepareStart(lHandUp, rHandUp) {
            if (gameActive || waitingForNeutral) return;
            if (lHandUp && rHandUp) startTriggerSide = "both";
            else if (lHandUp) startTriggerSide = "left";
            else if (rHandUp) startTriggerSide = "right";

            waitingForNeutral = true;
            const cmdEl = document.getElementById('command-text');
            cmdEl.innerText = "手を下げてスタート";
            cmdEl.style.fontSize = "25vh";
            cmdEl.style.color = "#ff0";
            playSound(660, 0.2);
        }

        function nextCommand() {
            currentTarget = commands[Math.floor(Math.random() * commands.length)];
            const cmdEl = document.getElementById('command-text');
            cmdEl.innerText = currentTarget; 
            cmdEl.style.fontSize = "38vh";
            cmdEl.style.color = "#00ff00"; 
            speak(currentTarget);
        }

        function endGame(isAborted = false) {
            gameActive = false;
            waitingForNeutral = false;
            clearInterval(timerInterval);
            lastEndTime = Date.now();
            const resScr = document.getElementById('result-screen');
            resScr.style.display = 'flex';
            resScr.classList.add('preview-mode');
            document.getElementById('final-score').innerText = score;
            document.getElementById('command-text').innerText = ""; 
            if (isAborted) {
                document.getElementById('result-title').innerText = "QUIT GAME";
                speak("ちゅうだんしました");
            } else {
                document.getElementById('result-title').innerText = "TIME UP";
                speak("しゅうりょう。スコアは" + score + "てん");
            }
        }

        function onResults(results) {
            canvasElement.width = results.image.width;
            canvasElement.height = results.image.height;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (!gameActive) {
                canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
                if (results.poseLandmarks) {
                    drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: 'rgba(0,255,200,0.5)', lineWidth: 2});
                }
            } else {
                canvasCtx.fillStyle = '#000';
                canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
            }

            if (results.poseLandmarks) {
                const lm = results.poseLandmarks;
                const nose = lm[0];
                const lWrist = lm[15], rWrist = lm[16];
                const lAnkle = lm[27], rAnkle = lm[28], lKnee = lm[25], rKnee = lm[26], lHip = lm[23], rHip = lm[24];

                const isFullBodyVisible = nose.visibility > 0.6 && lAnkle.visibility > 0.6 && rAnkle.visibility > 0.6;
                const lHandUp = lWrist.y < nose.y;
                const rHandUp = rWrist.y < nose.y;
                
                // りょうあし判定用
                const currentDistL = Math.abs(lAnkle.y - lHip.y);
                const currentDistR = Math.abs(rAnkle.y - rHip.y);
                const isLFootBent = initialHipAnkleDistL > 0 && currentDistL < (initialHipAnkleDistL * LEG_THRESHOLD_RATIO);
                const isRFootBent = initialHipAnkleDistR > 0 && currentDistR < (initialHipAnkleDistR * LEG_THRESHOLD_RATIO);

                if (!gameActive && !waitingForNeutral && isFullBodyVisible && (lHandUp || rHandUp)) {
                    if (Date.now() - lastEndTime > START_COOLDOWN) {
                        prepareStart(lHandUp, rHandUp);
                    }
                }
                
                if (waitingForNeutral && !lHandUp && !rHandUp) {
                    triggerRealStart(lm);
                }

                if (gameActive && (lHandUp || rHandUp)) {
                    if (handsUpStartTime === null) handsUpStartTime = Date.now();
                    else if (Date.now() - handsUpStartTime >= EXIT_HOLD_TIME) {
                        endGame(true);
                        handsUpStartTime = null;
                        return;
                    }
                } else { handsUpStartTime = null; }

                if (gameActive) {
                    const cmdEl = document.getElementById('command-text');
                    
                    if (isWaitingForReturn) {
                        const isLVisible = lAnkle.visibility > VISIBILITY_THRESHOLD && lKnee.visibility > VISIBILITY_THRESHOLD;
                        const isRVisible = rAnkle.visibility > VISIBILITY_THRESHOLD && rKnee.visibility > VISIBILITY_THRESHOLD;
                        
                        const isLKneeStatic = Math.abs(lKnee.y - initialKneeY_L) < KNEE_STAY_THRESHOLD;
                        const isRKneeStatic = Math.abs(rKnee.y - initialKneeY_R) < KNEE_STAY_THRESHOLD;
                        
                        // 初期位置に足が戻っているか
                        const isLNeutral = Math.abs(lAnkle.y - initialAnkleY_L) < RETURN_TH && Math.abs(lAnkle.x - initialAnkleX_L) < RETURN_TH;
                        const isRNeutral = Math.abs(rAnkle.y - initialAnkleY_R) < RETURN_TH && Math.abs(rAnkle.x - initialAnkleX_R) < RETURN_TH;

                        if (!isLFootBent && !isRFootBent && isLKneeStatic && isRKneeStatic && isLNeutral && isRNeutral && isLVisible && isRVisible) {
                            isWaitingForReturn = false;
                            nextCommand();
                        }
                    } 
                    else if (!isProcessingSuccess) {
                        let success = false;
                        
                        // 足首の変位を計算
                        const lAnkleDiffY = lAnkle.y - initialAnkleY_L;
                        const rAnkleDiffY = rAnkle.y - initialAnkleY_R;
                        const lAnkleDiffX = lAnkle.x - initialAnkleX_L;
                        const rAnkleDiffX = rAnkle.x - initialAnkleX_R;

                        // 許容幅を持たせた静止判定
                        const isRAnkleStatic = Math.abs(rAnkleDiffY) < (RETURN_TH + 0.02) && Math.abs(rAnkleDiffX) < (RETURN_TH + 0.02);
                        const isLAnkleStatic = Math.abs(lAnkleDiffY) < (RETURN_TH + 0.02) && Math.abs(lAnkleDiffX) < (RETURN_TH + 0.02);

                        switch(currentTarget) {
                            case "ひだりまえ": 
                                if (lAnkleDiffY > STEP_FORWARD_TH && isRAnkleStatic) success = true; 
                                break;
                            case "みぎまえ": 
                                if (rAnkleDiffY > STEP_FORWARD_TH && isLAnkleStatic) success = true; 
                                break;
                            case "ひだりうしろ": 
                                if (lAnkleDiffY < STEP_BACKWARD_TH && isRAnkleStatic) success = true; 
                                break;
                            case "みぎうしろ": 
                                if (rAnkleDiffY < STEP_BACKWARD_TH && isLAnkleStatic) success = true; 
                                break;
                            case "ひだりそと": 
                                // 反転前の座標系：左半身のxは元々大きい。さらに外に出ると大きくなる。
                                if (lAnkleDiffX > STEP_OUTWARD_TH && isRAnkleStatic) success = true; 
                                break;
                            case "みぎそと": 
                                // 反転前の座標系：右半身のxは元々小さい。さらに外に出ると小さくなる。
                                if (rAnkleDiffX < -STEP_OUTWARD_TH && isLAnkleStatic) success = true; 
                                break;
                            case "りょうあし": 
                                if (isLFootBent && isRFootBent) success = true; 
                                break;
                            case "かかとあげ":
                                const avgShankDist = (Math.abs(initialAnkleY_L - initialKneeY_L) + Math.abs(initialAnkleY_R - initialKneeY_R)) / 2;
                                const liftL = initialKneeY_L - lKnee.y;
                                const liftR = initialKneeY_R - rKnee.y;
                                const isAnyArmRescue = (lWrist.y < initialElbowY) || (rWrist.y < initialElbowY);
                                const isKneesLevel = Math.abs(lKnee.y - rKnee.y) < 0.05; 

                                if (isKneesLevel) {
                                    if (liftL > avgShankDist / 13 && liftR > avgShankDist / 13) success = true; 
                                    else if (isAnyArmRescue && liftL > avgShankDist / 40 && liftR > avgShankDist / 40) success = true; 
                                }
                                break;
                        }

                        if (success) {
                            isProcessingSuccess = true; 
                            score++;
                            document.getElementById('val-score').innerText = score;
                            playSound(1200, 0.2);
                            cmdEl.innerText = "せいかい！";
                            cmdEl.style.color = "#ff0000"; 
                            setTimeout(() => {
                                isProcessingSuccess = false;
                                isWaitingForReturn = true;
                                cmdEl.innerText = "もどして";
                                cmdEl.style.color = "#ffff00";
                            }, 450);
                        }
                    }
                }
            }
            canvasCtx.restore();
        }

        const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        pose.onResults(onResults);
        const camera = new Camera(videoElement, { onFrame: async () => { await pose.send({image: videoElement}); }, width: 1280, height: 720 });

        function initApp() {
            if (appInitialized) return;
            audioCtx.resume();
            appInitialized = true;
            document.querySelector('.btn-start').style.display = 'none';
            camera.start().then(() => { document.getElementById('start-screen').classList.add('preview-mode'); });
        }
    </script>
</body>
</html>
